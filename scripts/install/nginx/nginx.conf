# For more information on configuration, see:
#   * Official English Documentation: http://nginx.org/en/docs/
#   * Official Russian Documentation: http://nginx.org/ru/docs/

#user nginx;
#worker_processes auto;
error_log /opt/homebrew/var/log/nginx/error.log notice;
#pid /run/nginx.pid;

# Load dynamic modules. See /usr/share/doc/nginx/README.dynamic.
include /usr/share/nginx/modules/*.conf;

events {
    worker_connections 128;
}

http {
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" "$http_x_forwarded_host"';

    access_log  /opt/homebrew/var/log/nginx/access.log  main;

    sendfile            on;
    tcp_nopush          on;
    keepalive_timeout   65;
    types_hash_max_size 4096;

    include              /opt/homebrew/etc/nginx/mime.types;
    default_type        application/octet-stream;

    #include /etc/nginx/conf.d/*.conf;






server {
    listen 443 ssl;
    server_name YOUR_CNAME_HERE;

    ssl_certificate     /opt/homebrew/etc/nginx/ssl/YOUR_CNAME_HERE.crt;
    ssl_certificate_key /opt/homebrew/etc/nginx/ssl/YOUR_CNAME_HERE.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 100M;
    # Keep medium-sized POST bodies (bulk imports, XLSX uploads) fully in memory.
    # Prevents spilling to client_body_temp_path, which has historically failed
    # with EACCES on Homebrew installs (mismatched ownership of /opt/homebrew/var/run/nginx).
    client_body_buffer_size 16m;
    # Explicit, world-writable temp path as a safety net if a body ever exceeds 16 MB.
    client_body_temp_path /tmp/nginx_client_body;

        # Load configuration files for the default server block.
        include /etc/nginx/default.d/*.conf;


	location / {

        	proxy_pass http://127.0.0.1:4321;  # or the port Astro runs on
        	proxy_http_version 1.1;
        	proxy_set_header Upgrade $http_upgrade;
        	proxy_set_header Connection 'upgrade';
        	proxy_set_header Host $server_name;
        	proxy_cache_bypass $http_upgrade;
                proxy_set_header X-Forwarded-Host $server_name;        # ← ADD THIS
                proxy_set_header X-Forwarded-Port $server_port; # ← ADD THIS
    	}

        location /api {
                proxy_pass http://127.0.0.1:8080;  # or the port Astro runs on
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection 'upgrade';
                proxy_set_header Host $server_name;
                proxy_cache_bypass $http_upgrade;
                proxy_set_header X-Forwarded-Host YOUR_CNAME_HERE;        # ← ADD THIS
                proxy_set_header X-Forwarded-Port $server_port; # ← ADD THIS

                proxy_buffering off;
                proxy_cache off;
                proxy_read_timeout 3600s;
                proxy_intercept_errors off;
                # Stream the client request body directly to Micronaut instead of
                # buffering it to a temp file. Eliminates the client_body_temp_path
                # failure mode for large POSTs (bulk user-mappings, XLSX imports, etc.).
                proxy_request_buffering off;
	}

        location /mcp { 
                proxy_pass http://127.0.0.1:8080;  # or the port Astro runs on
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection 'upgrade';
                proxy_set_header Host $server_name;
                proxy_cache_bypass $http_upgrade;
                proxy_set_header X-Forwarded-Host YOUR_CNAME_HERE;        # ← ADD THIS
                proxy_set_header X-Forwarded-Port $server_port; # ← ADD THIS
                proxy_intercept_errors off;
                
        }

        location /oauth {
                proxy_pass http://127.0.0.1:8080;  # or the port Astro runs on
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection 'upgrade';
                proxy_set_header Host $server_name;
                proxy_cache_bypass $http_upgrade;
                proxy_set_header X-Forwarded-Host YOUR_CNAME_HERE;        # ← ADD THIS
                proxy_set_header X-Forwarded-Port $server_port; # ← ADD THIS
                proxy_intercept_errors off;

        }


        error_page 404 /404.html;
        location = /404.html {
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
        }
    }

}

