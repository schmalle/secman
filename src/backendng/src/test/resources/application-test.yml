# Test configuration for Feature 056 - Test Suite
# Applied when running tests with @MicronautTest

micronaut:
  application:
    name: secman-test
  security:
    enabled: true
    token:
      jwt:
        signatures:
          secret:
            generator:
              secret: test-secret-key-for-jwt-signing-minimum-256-bits-long-enough
              jws-algorithm: HS256
        generator:
          access-token:
            expiration: 3600

# Datasource: external MariaDB (no Docker/Testcontainers).
# Supply TEST_DB_* via pass-cli when running the suite. The defaults target a local, disposable
# `secman_test` database. SAFETY: hbm2ddl=create-drop drops the schema each run, so TEST_DB_URL
# must NEVER point at the dev/production database (DB_CONNECT).
datasources:
  default:
    url: ${TEST_DB_URL:jdbc:mariadb://localhost:3306/secman_test}
    username: ${TEST_DB_USERNAME:secman_test}
    password: ${TEST_DB_PASSWORD:secman_test}
    driverClassName: org.mariadb.jdbc.Driver
    dialect: MYSQL

jpa:
  default:
    properties:
      hibernate:
        hbm2ddl:
          auto: create-drop
        show_sql: false
        format_sql: false

# Disable Flyway for tests - use Hibernate schema generation
flyway:
  enabled: false

# Reduce logging verbosity in tests
logger:
  levels:
    io.micronaut: WARN
    com.secman: INFO
    org.hibernate: WARN
