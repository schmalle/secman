title: SECMAN Blog
description: Security Management Insights & Updates
baseurl: "/secman"
url: "https://schmalle.github.io"

markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:day/:title/

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate

paginate: 6
paginate_path: "/blog/page:num/"

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "SECMAN Team"
